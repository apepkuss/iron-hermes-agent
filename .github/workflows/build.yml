name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/release.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/release.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Clippy
        run: cargo +nightly clippy --all-features --workspace -- -D warnings

      - name: Install stable toolchain for tests
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x86_64
            target: x86_64-apple-darwin
            os: macos-13
            use-cross: false

          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-14
            use-cross: false

          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: false

          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
