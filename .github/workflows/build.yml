name: Build

on:
  push:
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/release.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/workflows/release.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (for iron-desktop / Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Clippy
        run: cargo +nightly clippy --all-features --workspace -- -D warnings

      - name: Install stable toolchain for tests
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace

  build:
    name: Build (${{ matrix.name }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-14

          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release -p iron-server
