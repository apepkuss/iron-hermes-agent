name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run_version:
        description: "Version tag to stamp into Cargo.toml for this dry run (e.g. v0.0.2-rc1). The publish job is skipped when running manually."
        required: true
        default: "v0.0.0-manual"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: iron-hermes

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-14

          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.dry_run_version || github.ref_name }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION_CLEAN=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set workspace version
        shell: bash
        run: |
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION_CLEAN}\"/" Cargo.toml
          rm Cargo.toml.bak
          grep "^version" Cargo.toml

      - name: Build release binary
        run: cargo build --release -p iron-server

      - name: Package
        shell: bash
        run: |
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          ARCHIVE_DIR="staging/${ARCHIVE_NAME}"

          mkdir -p "${ARCHIVE_DIR}"

          # Copy binary (rename iron-server → iron-hermes)
          cp "target/release/iron-server" "${ARCHIVE_DIR}/${BINARY_NAME}"

          # Copy documentation
          cp README.md "${ARCHIVE_DIR}/" 2>/dev/null || true
          cp LICENSE "${ARCHIVE_DIR}/" 2>/dev/null || true

          # Create tar.gz
          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: staging/${{ env.ARCHIVE }}
          if-no-files-found: error

  build-desktop:
    name: Desktop (${{ matrix.name }})
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-14

          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.dry_run_version || github.ref_name }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION_CLEAN=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Set workspace version
        shell: bash
        run: |
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION_CLEAN}\"/" Cargo.toml
          rm Cargo.toml.bak
          grep "^version" Cargo.toml

      - name: Build desktop app
        working-directory: crates/iron-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target ${{ matrix.target }}

      - name: List bundle outputs (diagnostic)
        shell: bash
        run: |
          echo "== bundle tree =="
          find "target/${{ matrix.target }}/release/bundle" -maxdepth 3 -type f | sort

      - name: Collect desktop artifacts
        shell: bash
        run: |
          set -euo pipefail
          DESKTOP_DIR="desktop-staging"
          mkdir -p "${DESKTOP_DIR}"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.dmg"
            # Updater archive + signature — must exist, fail loudly if missing.
            cp target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.app.tar.gz"
            cp target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.app.tar.gz.sig"
          else
            # .deb is best-effort — not every distro layout produces one on every
            # runner, and the AppImage alone is enough for user-facing installs.
            cp target/${{ matrix.target }}/release/bundle/deb/*.deb \
              "${DESKTOP_DIR}/iron-hermes-desktop-${VERSION}-${{ matrix.target }}.deb" 2>/dev/null || true
            # AppImage itself — must exist.
            cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.AppImage"
            # Updater archive + signature (AppImage) — must exist, fail loudly
            # if missing so the Linux updater channel stays usable. Previously
            # these copies were swallowed with `|| true`, which silently left
            # Linux users without an auto-update path.
            cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.AppImage.tar.gz"
            cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.AppImage.tar.gz.sig"
          fi

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: desktop-staging/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [build-release, build-desktop]
    # Skip publishing when the workflow is triggered manually (dry run).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          # git-cliff needs the full history + tag graph to compute the
          # commit range for this release.
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          cd artifacts
          find . -type f \( \
            -name "*.tar.gz" -o \
            -name "*.tar.gz.sig" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o \
            -name "*.AppImage" \
          \) -exec mv {} . \;

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1 || echo "")

          # Only three commit types end up in the release body (and in the
          # Tauri auto-updater dialog): feat, fix, refactor. Everything else
          # (ci/chore/docs/test/build/style/perf/unknown) is dropped so the
          # notes stay focused on user-visible changes.
          #
          # Scope is preserved: `feat(webui): redesign` becomes
          # `- **webui:** redesign`; an unscoped `feat: ...` becomes
          # `- ...` without a leading scope marker.
          format_bullets() {
            local type="$1"
            grep -E "^${type}(\([^)]*\))?!?:" "${COMMITS_FILE}" \
              | sed -E \
                  -e 's/^[a-z]+\(([^)]+)\)!?: */- **\1:** /' \
                  -e 's/^[a-z]+!?: */- /' \
              || true
          }

          if [ -z "${PREV_TAG}" ]; then
            echo "## Initial Release" > RELEASE_NOTES.md
          else
            echo "## Changes since ${PREV_TAG}" > RELEASE_NOTES.md

            COMMITS_FILE=$(mktemp)
            git log "${PREV_TAG}..${TAG}" --pretty=format:"%s" > "${COMMITS_FILE}"

            FEATURES=$(format_bullets "feat")
            FIXES=$(format_bullets "fix")
            REFACTORS=$(format_bullets "refactor")

            if [ -n "${FEATURES}" ]; then
              { echo ""; echo "### Features"; echo ""; echo "${FEATURES}"; } >> RELEASE_NOTES.md
            fi
            if [ -n "${FIXES}" ]; then
              { echo ""; echo "### Bug Fixes"; echo ""; echo "${FIXES}"; } >> RELEASE_NOTES.md
            fi
            if [ -n "${REFACTORS}" ]; then
              { echo ""; echo "### Refactors"; echo ""; echo "${REFACTORS}"; } >> RELEASE_NOTES.md
            fi

            rm -f "${COMMITS_FILE}"
          fi
          echo "-- RELEASE_NOTES.md --"
          cat RELEASE_NOTES.md

      - name: Generate update manifest
        run: |
          python3 .github/scripts/generate_update_manifest.py \
            --version "${GITHUB_REF_NAME}" \
            --artifacts-dir artifacts \
            --repo "${GITHUB_REPOSITORY}" \
            --notes-file RELEASE_NOTES.md \
            --output artifacts/latest.json
          cat artifacts/latest.json

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.dmg *.deb *.AppImage latest.json 2>/dev/null > checksums.txt || true
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Use the curated notes instead of GitHub's auto-summary so the
          # release page, the `latest.json.notes`, and the desktop auto-
          # updater dialog all show the same conventional-commits digest.
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sig
            artifacts/*.dmg
            artifacts/*.deb
            artifacts/*.AppImage
            artifacts/latest.json
            artifacts/checksums.txt
