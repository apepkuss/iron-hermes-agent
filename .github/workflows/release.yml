name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: iron-hermes

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-14

          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set workspace version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION}\"/" Cargo.toml
          rm Cargo.toml.bak
          grep "^version" Cargo.toml

      - name: Build release binary
        run: cargo build --release -p iron-server

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          ARCHIVE_DIR="staging/${ARCHIVE_NAME}"

          mkdir -p "${ARCHIVE_DIR}"

          # Copy binary (rename iron-server → iron-hermes)
          cp "target/release/iron-server" "${ARCHIVE_DIR}/${BINARY_NAME}"

          # Copy documentation
          cp README.md "${ARCHIVE_DIR}/" 2>/dev/null || true
          cp LICENSE "${ARCHIVE_DIR}/" 2>/dev/null || true

          # Create tar.gz
          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: staging/${{ env.ARCHIVE }}
          if-no-files-found: error

  build-desktop:
    name: Desktop (${{ matrix.name }})
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-14

          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Set workspace version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION}\"/" Cargo.toml
          rm Cargo.toml.bak
          grep "^version" Cargo.toml

      - name: Build desktop app
        working-directory: crates/iron-desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect desktop artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DESKTOP_DIR="desktop-staging"
          mkdir -p "${DESKTOP_DIR}"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.dmg"
            # Updater archive + signature
            cp target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.app.tar.gz"
            cp target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.app.tar.gz.sig"
          else
            cp target/${{ matrix.target }}/release/bundle/deb/*.deb \
              "${DESKTOP_DIR}/iron-hermes-desktop-${VERSION}-${{ matrix.target }}.deb" 2>/dev/null || true
            cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.AppImage" 2>/dev/null || true
            # Updater archive + signature (AppImage only)
            cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.AppImage.tar.gz" 2>/dev/null || true
            cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig \
              "${DESKTOP_DIR}/Iron-Hermes-${VERSION}-${{ matrix.target }}.AppImage.tar.gz.sig" 2>/dev/null || true
          fi

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: desktop-staging/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [build-release, build-desktop]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          cd artifacts
          find . -type f \( \
            -name "*.tar.gz" -o \
            -name "*.tar.gz.sig" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o \
            -name "*.AppImage" \
          \) -exec mv {} . \;

      - name: Generate update manifest
        run: |
          python3 .github/scripts/generate_update_manifest.py \
            --version "${GITHUB_REF_NAME}" \
            --artifacts-dir artifacts \
            --repo "${GITHUB_REPOSITORY}" \
            --output artifacts/latest.json
          cat artifacts/latest.json

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.dmg *.deb *.AppImage latest.json 2>/dev/null > checksums.txt || true
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sig
            artifacts/*.dmg
            artifacts/*.deb
            artifacts/*.AppImage
            artifacts/latest.json
            artifacts/checksums.txt
