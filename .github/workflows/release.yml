name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: iron-hermes

permissions:
  contents: write

jobs:
  build-release:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            target: aarch64-apple-darwin
            os: macos-14

          - name: Linux x86_64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          ARCHIVE_DIR="staging/${ARCHIVE_NAME}"

          mkdir -p "${ARCHIVE_DIR}"

          # Copy binary (rename iron-server → iron-hermes)
          cp "target/release/iron-server" "${ARCHIVE_DIR}/${BINARY_NAME}"

          # Copy documentation
          cp README.md "${ARCHIVE_DIR}/" 2>/dev/null || true
          cp LICENSE "${ARCHIVE_DIR}/" 2>/dev/null || true

          # Create tar.gz
          cd staging
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: staging/${{ env.ARCHIVE }}
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec mv {} . \;
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
