# git-cliff configuration.
# Drives RELEASE_NOTES.md at tag time and the `notes` field in latest.json
# (which Tauri surfaces inside the desktop auto-updater dialog).
#
# Commits are grouped by conventional-commits prefix: `feat:` / `fix:` / etc.
# Scope (`feat(webui): ...`) is kept verbatim in the bullet so readers can
# tell which crate or subsystem changed without leaving the release page.

[changelog]
header = ""
body = """
{% if version -%}
## {{ version }}{% if timestamp %} - {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}
{% else -%}
## Unreleased
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | split(pat="\n") | first | trim }}{% if commit.breaking %} **[breaking]**{% endif %}
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Ordered: the first matching parser wins.
commit_parsers = [
  { message = "^feat",                  group = "Features" },
  { message = "^fix",                   group = "Bug Fixes" },
  { message = "^refactor",              group = "Refactors" },
  { message = "^perf",                  group = "Performance" },
  { message = "^docs",                  group = "Documentation" },
  { message = "^test",                  group = "Tests" },
  { message = "^ci",                    group = "CI" },
  { message = "^build",                 group = "Build" },
  { message = "^chore\\(release\\)",    skip = true },
  { message = "^chore\\(deps\\)",       group = "Dependencies" },
  { message = "^chore",                 group = "Chores" },
  { body = ".*security",                group = "Security" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+.*"
topo_order = false
sort_commits = "newest"
