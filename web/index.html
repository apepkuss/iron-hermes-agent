<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON HERMES</title>
<link rel="icon" type="image/png" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
<script>
  // Apply saved theme BEFORE first paint to avoid flash
  (function(){
    try {
      var saved = localStorage.getItem('iron_theme');
      if (saved === 'dark') document.documentElement.classList.add('dark');
      else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    } catch(e) {}
  })();
</script>
<style>
/* ── Pure Ink design tokens ── */
:root {
  --bg-primary: #fafafa;
  --bg-secondary: #f0f0f0;
  --bg-sidebar: #f5f5f5;
  --bg-card: #ffffff;
  --bg-card-hover: #fafafa;
  --bg-input: #ffffff;

  --border-color: #e0e0e0;
  --border-light: #ebebeb;

  --accent-primary: #333333;
  --accent-hover: #1a1a1a;
  --accent-muted: #888888;

  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-muted: #999999;

  --success: #2e7d32;
  --error: #c62828;
  --warning: #f57f17;

  --msg-user-bg: #f0f0f0;
  --msg-assistant-bg: #f5f5f5;

  --code-bg: #f4f4f4;
  --code-block-bg: #f7f7f7;

  --text-on-accent: #ffffff;
  --overlay-bg: rgba(26, 26, 26, 0.35);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
}

.dark {
  --bg-primary: #1a1a1a;
  --bg-secondary: #252525;
  --bg-sidebar: #202020;
  --bg-card: #262626;
  --bg-card-hover: #2e2e2e;
  --bg-input: #2a2a2a;

  --border-color: #3a3a3a;
  --border-light: #2e2e2e;

  --accent-primary: #e0e0e0;
  --accent-hover: #f5f5f5;
  --accent-muted: #888888;

  --text-primary: #e0e0e0;
  --text-secondary: #a0a0a0;
  --text-muted: #666666;

  --success: #66bb6a;
  --error: #ef5350;
  --warning: #ffb74d;

  --msg-user-bg: #2e2e2e;
  --msg-assistant-bg: #252525;

  --code-bg: #1e1e1e;
  --code-block-bg: #151515;

  --text-on-accent: #1a1a1a;
  --overlay-bg: rgba(0, 0, 0, 0.55);

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.35);
  --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.5);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.25s ease, color 0.25s ease;
}

button, input, select, textarea {
  font-family: inherit;
  color: inherit;
}

/* ── App shell ── */
.app-shell {
  display: flex;
  flex-direction: row;
  height: 100%;
  overflow: hidden;
}

/* ── Sidebar ── */
.app-sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  transition: background-color 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
  z-index: 50;
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 18px 16px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}

.sidebar-logo-mark {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  display: block;
  object-fit: contain;
}

.sidebar-logo-text {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-primary);
  white-space: nowrap;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 8px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 13px;
  text-align: left;
  cursor: pointer;
  transition: background-color 0.15s ease, color 0.15s ease;
  width: 100%;
}

.nav-item:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--bg-card);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

.nav-item svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.nav-group-label {
  padding: 14px 12px 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.sidebar-footer {
  padding: 10px;
  border-top: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  position: relative;
}

/* Language popover */
.lang-popover {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 10px;
  min-width: 140px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 4px;
  box-shadow: var(--shadow-md);
  opacity: 0;
  visibility: hidden;
  transform: translateY(4px);
  transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s;
  z-index: 60;
}
.lang-popover.open {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}
.lang-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 8px 10px;
  border: none;
  background: transparent;
  color: var(--text-primary);
  font-size: 13px;
  text-align: left;
  cursor: pointer;
  border-radius: 6px;
  transition: background-color 0.12s ease;
}
.lang-option:hover {
  background: var(--bg-card-hover);
}
.lang-option .check {
  color: var(--text-muted);
  opacity: 0;
  font-size: 12px;
}
.lang-option.active .check {
  opacity: 1;
  color: var(--text-primary);
}

.icon-btn {
  width: 32px;
  height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  padding: 0;
}

.icon-btn:hover {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border-color);
}

.icon-btn.active {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--border-color);
}

.icon-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.sidebar-footer .version {
  margin-left: auto;
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  font-size: 10px;
  color: var(--text-muted);
  padding-right: 4px;
  letter-spacing: 0.04em;
}

/* ── Main area ── */
.app-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
  min-width: 0;
}

.main-header {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
  min-height: 56px;
}

.mobile-sidebar-toggle {
  display: none;
  width: 32px;
  height: 32px;
  background: transparent;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  align-items: center;
  justify-content: center;
  color: var(--text-primary);
  cursor: pointer;
}
.mobile-sidebar-toggle svg {
  width: 16px; height: 16px;
  stroke: currentColor; fill: none; stroke-width: 1.5;
}

.main-header-title {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.model-selector {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: auto;
}

.model-selector label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.model-selector select {
  font-size: 12px;
  padding: 6px 10px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-input);
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
  max-width: 260px;
  transition: border-color 0.15s ease;
}
.model-selector select:focus {
  border-color: var(--accent-primary);
}

.refresh-btn {
  width: 28px;
  height: 28px;
  padding: 0;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-input);
  color: var(--text-secondary);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.refresh-btn:hover:not(:disabled) {
  background: var(--bg-card-hover);
  color: var(--text-primary);
  border-color: var(--accent-primary);
}
.refresh-btn:disabled {
  cursor: wait;
  opacity: 0.5;
}
.refresh-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.refresh-btn.spinning svg {
  animation: spin 0.8s linear infinite;
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ── Chat area ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 24px 8px;
  scroll-behavior: smooth;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Empty state ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  opacity: 0.7;
  user-select: none;
  padding: 40px 20px;
}

.empty-logo {
  width: 72px;
  height: 72px;
  position: relative;
  opacity: 0.5;
}
.empty-logo .geo-circle {
  position: absolute; inset: 0;
  border: 3px solid var(--text-primary);
  border-radius: 50%;
}
.empty-logo .geo-square {
  position: absolute;
  width: 30px; height: 30px;
  top: 21px; left: 21px;
  border: 3px solid var(--text-primary);
  border-radius: 6px;
}
.empty-logo .geo-diamond {
  position: absolute;
  width: 8px; height: 8px;
  top: 50%; left: 50%;
  border: 2px solid var(--text-primary);
  transform: translate(-50%, -50%) rotate(45deg);
}

.empty-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.empty-tagline {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

/* ── Messages ── */
.message {
  display: flex;
  flex-direction: column;
  animation: msgIn 0.2s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.message-user {
  align-items: flex-end;
}

.message-user .msg-body {
  max-width: 75%;
}

.message.message-assistant {
  flex-direction: row;
  align-items: flex-start;
  gap: 10px;
}

.message-assistant .msg-avatar {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
  margin-top: 2px;
  position: relative;
  border-radius: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: center;
}
.msg-avatar .geo-circle {
  position: absolute;
  width: 22px; height: 22px;
  top: 8px; left: 8px;
  border: 2px solid var(--text-primary);
  border-radius: 50%;
  box-sizing: border-box;
}
.msg-avatar .geo-square {
  position: absolute;
  width: 10px; height: 10px;
  top: 14px; left: 14px;
  border: 2px solid var(--text-primary);
  border-radius: 2px;
  box-sizing: border-box;
}
.msg-avatar .geo-diamond {
  position: absolute;
  width: 3px; height: 3px;
  top: 50%; left: 50%;
  background: var(--text-primary);
  transform: translate(-50%, -50%) rotate(45deg);
}

.message-assistant .msg-body {
  max-width: calc(100% - 50px);
  flex: 1;
  min-width: 0;
}

.msg-bubble {
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.65;
  word-break: break-word;
  border-radius: 10px;
  background: var(--msg-user-bg);
}

.message-assistant .msg-bubble {
  background: var(--msg-assistant-bg);
}

.message-content {
  word-wrap: break-word;
  overflow-wrap: break-word;
  min-width: 0;
}

.message-content p {
  margin-bottom: 8px;
}
.message-content p:last-child { margin-bottom: 0; }

.message-content strong { font-weight: 600; }

.message-content code {
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  font-size: 13px;
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--text-primary);
}

.message-content pre {
  background: var(--code-block-bg);
  color: var(--text-primary);
  padding: 12px 14px;
  margin: 10px 0;
  overflow-x: auto;
  border-radius: 6px;
  border: 1px solid var(--border-light);
  font-size: 13px;
  line-height: 1.55;
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
}

.message-content pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  color: inherit;
  border-radius: 0;
}

.message-content ul,
.message-content ol {
  margin: 8px 0;
  padding-left: 22px;
}
.message-content li { margin-bottom: 4px; line-height: 1.6; }
.message-content li > ul,
.message-content li > ol { margin: 2px 0; }

.message-content h1,
.message-content h2,
.message-content h3,
.message-content h4 {
  margin: 16px 0 8px;
  font-weight: 600;
  line-height: 1.3;
}
.message-content h1 { font-size: 18px; }
.message-content h2 { font-size: 16px; }
.message-content h3 { font-size: 15px; }
.message-content h4 { font-size: 14px; color: var(--text-secondary); }
.message-content h1:first-child,
.message-content h2:first-child,
.message-content h3:first-child { margin-top: 0; }

.message-content blockquote {
  border-left: 3px solid var(--border-color);
  padding: 4px 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}

.message-content table {
  border-collapse: collapse;
  margin: 10px 0;
  width: 100%;
  font-size: 13px;
}
.message-content th,
.message-content td {
  border: 1px solid var(--border-color);
  padding: 6px 10px;
  text-align: left;
}
.message-content th {
  background: var(--bg-secondary);
  font-weight: 600;
}

.message-content hr {
  border: none;
  border-top: 1px solid var(--border-color);
  margin: 12px 0;
}

.message-content a {
  color: var(--text-primary);
  text-decoration: underline;
  text-decoration-color: var(--border-color);
  text-underline-offset: 3px;
}
.message-content a:hover {
  text-decoration-color: var(--text-primary);
}

/* ── Loading indicator (dots) ── */
.loading-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
}

.loading-dot {
  width: 6px;
  height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

.loading-text {
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.03em;
  margin-left: 6px;
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
}

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── Tool progress lines ── */
.tool-progress {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  font-size: 11px;
  color: var(--text-muted);
  padding: 2px 4px;
  margin-left: 50px;
  border-radius: 6px;
}

.tool-progress .tool-spinner {
  width: 10px;
  height: 10px;
  border: 1.5px solid var(--text-muted);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
  display: inline-block;
}
.tool-progress .tool-icon {
  width: 12px;
  height: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 12px;
  line-height: 1;
}
.tool-progress.tool-done .tool-icon { color: var(--text-primary); }
.tool-progress.tool-error .tool-icon { color: var(--error); }
.tool-progress.tool-error .tool-result { color: var(--error); }

.tool-progress .tool-name {
  font-weight: 600;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.tool-progress .tool-args,
.tool-progress .tool-result {
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Todo list ── */
.todo-container {
  margin-left: 50px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 8px 0;
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  font-size: 12px;
  background: var(--bg-card);
}

.todo-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 12px;
}

.todo-pending .todo-icon { color: var(--text-muted); }
.todo-in-progress .todo-icon {
  color: var(--text-primary);
  animation: spin 1.2s linear infinite;
  display: inline-block;
}
.todo-completed .todo-icon { color: var(--success); }

.todo-content { color: var(--text-primary); }
.todo-completed .todo-content {
  color: var(--text-muted);
  text-decoration: line-through;
}

/* ── Input area ── */
.input-area {
  flex-shrink: 0;
  padding: 12px 20px 18px;
  background: var(--bg-primary);
  border-top: 1px solid var(--border-light);
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 6px 6px 6px 14px;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.input-row:focus-within {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
}

.input-row textarea {
  flex: 1;
  font-size: 14px;
  line-height: 1.5;
  padding: 8px 0;
  border: none;
  background: transparent;
  color: var(--text-primary);
  resize: none;
  outline: none;
  min-height: 24px;
  max-height: 160px;
  overflow-y: auto;
}
.input-row textarea::placeholder { color: var(--text-muted); }
.input-row textarea:disabled { opacity: 0.5; cursor: not-allowed; }

.send-btn {
  width: 36px;
  height: 36px;
  background: var(--accent-primary);
  color: var(--text-on-accent);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background-color 0.15s ease;
  padding: 0;
}
.send-btn:hover:not(:disabled) { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Settings panel (right drawer) ── */
.settings-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 100;
  backdrop-filter: blur(2px);
}
.settings-backdrop.open { display: block; }

.settings-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 360px;
  max-width: 90vw;
  height: 100%;
  background: var(--bg-card);
  border-left: 1px solid var(--border-color);
  z-index: 101;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.settings-panel.open { transform: translateX(0); }

.settings-panel-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.settings-panel-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.settings-close-btn {
  width: 28px;
  height: 28px;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  border-radius: 6px;
  transition: color 0.15s ease, background-color 0.15s ease;
}
.settings-close-btn:hover { color: var(--text-primary); background: var(--bg-secondary); }
.settings-close-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }

.settings-body {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  flex: 1;
  overflow-y: auto;
}

.settings-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.settings-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.settings-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.settings-input,
.settings-select {
  font-size: 13px;
  padding: 8px 11px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-input);
  color: var(--text-primary);
  outline: none;
  width: 100%;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.settings-input:focus,
.settings-select:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
}

.settings-input::placeholder { color: var(--text-muted); }

.api-key-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.api-key-row .settings-input { flex: 1; }

.api-key-copy-btn {
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  width: 34px;
  height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: color 0.15s ease, border-color 0.15s ease;
}
.api-key-copy-btn:hover { color: var(--text-primary); border-color: var(--accent-primary); }
.api-key-copy-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

.settings-hint {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* Slider */
.slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.slider-value {
  font-size: 12px;
  font-weight: 600;
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  color: var(--text-primary);
  min-width: 40px;
  text-align: right;
  flex-shrink: 0;
}

.settings-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: var(--border-color);
  outline: none;
  border-radius: 1px;
  cursor: pointer;
}
.settings-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  background: var(--accent-primary);
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.15s ease;
}
.settings-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--accent-primary);
  border-radius: 50%;
  cursor: pointer;
  border: none;
}
.settings-slider::-webkit-slider-thumb:hover,
.settings-slider::-moz-range-thumb:hover { background: var(--accent-hover); }

.slider-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}
.slider-tick {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

.settings-footer {
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border-light);
  flex-shrink: 0;
}

.settings-save-btn {
  width: 100%;
  padding: 10px;
  background: var(--accent-primary);
  color: var(--text-on-accent);
  border: none;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background-color 0.15s ease;
}
.settings-save-btn:hover:not(:disabled) { background: var(--accent-hover); }
.settings-save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.settings-status {
  font-size: 11px;
  text-align: center;
  margin-top: 8px;
  min-height: 16px;
  color: var(--text-muted);
}
.settings-status.ok { color: var(--success); }
.settings-status.err { color: var(--error); }

/* Toolset toggles */
.toolset-toggles {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.toolset-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: var(--bg-secondary);
  border-radius: 6px;
}

.toolset-toggle label {
  font-size: 12px;
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  color: var(--text-primary);
  cursor: pointer;
}

.toolset-toggle .tool-count {
  font-size: 10px;
  color: var(--text-muted);
  margin-left: 4px;
}

.toolset-toggle input[type="checkbox"] {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--accent-primary);
}

/* About & Updates */
.update-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.update-version {
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  font-size: 12px;
  color: var(--text-secondary);
}
.check-updates-btn {
  padding: 7px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.check-updates-btn:hover:not(:disabled) {
  background: var(--bg-card-hover);
  border-color: var(--accent-primary);
}
.check-updates-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.update-status {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-muted);
  min-height: 16px;
}
.update-status.info { color: var(--text-muted); }
.update-status.success { color: var(--success); }
.update-status.error { color: var(--error); }

/* Update modal */
.update-modal-backdrop {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(2px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.update-modal-backdrop.open { display: flex; }

.update-modal {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 14px;
  width: min(480px, calc(100% - 40px));
  max-height: calc(100% - 40px);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  color: var(--text-primary);
}
.update-modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-light);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.02em;
}
.update-modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.update-version-line {
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.update-version-line .new {
  color: var(--success);
  font-weight: 600;
}
.update-notes-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
  margin-bottom: 6px;
}
.update-notes {
  font-size: 13px;
  line-height: 1.6;
  max-height: 200px;
  overflow-y: auto;
  padding: 10px 12px;
  background: var(--code-bg);
  border-radius: 8px;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text-primary);
}
.update-progress-container {
  margin-top: 14px;
  display: none;
}
.update-progress-container.active { display: block; }
.update-progress-track {
  width: 100%;
  height: 6px;
  background: var(--border-color);
  border-radius: 3px;
  overflow: hidden;
}
.update-progress-fill {
  height: 100%;
  background: var(--accent-primary);
  width: 0%;
  transition: width 0.2s;
}
.update-progress-text {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
}
.update-modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.update-btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid var(--border-color);
  background: var(--bg-input);
  color: var(--text-primary);
  transition: background 0.15s ease, border-color 0.15s ease;
}
.update-btn:hover:not(:disabled) { background: var(--bg-card-hover); border-color: var(--accent-primary); }
.update-btn.primary {
  background: var(--accent-primary);
  color: var(--text-on-accent);
  border-color: var(--accent-primary);
}
.update-btn.primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
.update-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Scrollbar ── */
*::-webkit-scrollbar { width: 6px; height: 6px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}
*::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .app-sidebar {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    transform: translateX(-100%);
    box-shadow: var(--shadow-lg);
  }
  .app-sidebar.open { transform: translateX(0); }
  .mobile-sidebar-toggle { display: inline-flex; }
  .chat-area { padding: 16px 16px 8px; }
  .input-area { padding: 10px 14px 16px; }
  .main-header { padding: 10px 14px; }
  .model-selector label { display: none; }
  .model-selector select { max-width: 160px; }
  .tool-progress, .todo-container { margin-left: 0; }
  .message-assistant .msg-body { max-width: calc(100% - 50px); }
  .message-user .msg-body { max-width: 90%; }
  .settings-panel { width: 100%; }
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="app-sidebar" id="appSidebar">
    <div class="sidebar-logo">
      <img class="sidebar-logo-mark" src="/assets/logo.png" alt="Iron Hermes">
      <span class="sidebar-logo-text">Iron Hermes</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" id="newChatBtn" data-i18n-title="sidebar.newChat" title="New Chat">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        <span data-i18n="sidebar.newChat">New Chat</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="icon-btn" id="themeToggleBtn" data-i18n-title="btn.theme" title="Toggle theme">
        <svg class="theme-icon-light" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="theme-icon-dark" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" id="langToggleBtn" data-i18n-title="btn.language" title="Language">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" data-i18n-title="btn.settings" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <span class="version" id="appVersionSidebar"></span>
      <div class="lang-popover" id="langPopover">
        <button class="lang-option" data-locale="en">English<span class="check">✓</span></button>
        <button class="lang-option" data-locale="zh">中文<span class="check">✓</span></button>
      </div>
    </div>
  </aside>

  <!-- ── Main area ── -->
  <main class="app-main">
    <div class="main-header">
      <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" data-i18n-title="btn.menu" title="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="main-header-title" data-i18n="header.title">Chat</span>
      <div class="model-selector">
        <label for="modelSelect" data-i18n="header.model">Model</label>
        <select id="modelSelect"><option value="" data-i18n="model.loading">loading...</option></select>
        <button class="refresh-btn" id="refreshModelsBtn" data-i18n-title="btn.refresh" title="Refresh models">
          <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo">
          <div class="geo-circle"></div>
          <div class="geo-square"></div>
          <div class="geo-diamond"></div>
        </div>
        <div class="empty-title" data-i18n="empty.title">Iron Hermes</div>
        <div class="empty-tagline" data-i18n="empty.tagline">Intelligent Agent</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="msgInput" data-i18n-placeholder="input.placeholder" placeholder="Message Iron Hermes..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" data-i18n-title="btn.send" title="Send">
          <svg id="sendIcon" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- ── Settings backdrop ── -->
<div class="settings-backdrop" id="settingsBackdrop"></div>

<!-- ── Settings panel ── -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-panel-header">
    <span class="settings-panel-title" data-i18n="settings.title">Settings</span>
    <button class="settings-close-btn" id="settingsCloseBtn" data-i18n-title="btn.close" title="Close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="settings-body">
    <!-- Provider URL -->
    <div class="settings-field">
      <label class="settings-label" for="providerUrl" data-i18n="settings.providerUrl">Provider URL</label>
      <input class="settings-input" id="providerUrl" type="text"
        placeholder="http://localhost:9068/v1" value="http://localhost:9068/v1">
    </div>

    <!-- API Key -->
    <div class="settings-field">
      <label class="settings-label" for="apiKeyInput" data-i18n="settings.apiKey">API Key</label>
      <div class="api-key-row">
        <input class="settings-input" id="apiKeyInput" type="password" placeholder="">
        <button class="api-key-copy-btn" id="apiKeyCopyBtn" data-i18n-title="btn.copy" title="Copy">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>

    <!-- Auxiliary Model -->
    <div class="settings-field">
      <label class="settings-label" for="auxModelSelect" data-i18n="settings.auxModel">Auxiliary Model</label>
      <select class="settings-select" id="auxModelSelect">
        <option value="" data-i18n="settings.auxModelNone">None</option>
      </select>
      <span class="settings-hint" data-i18n="settings.auxModelHint">No auxiliary model = degraded compression</span>
    </div>

    <!-- Compression Threshold -->
    <div class="settings-field">
      <label class="settings-label" data-i18n="settings.compression">Compression Threshold</label>
      <div class="slider-row">
        <input class="settings-slider" id="compressionSlider" type="range" min="50" max="95" step="5" value="65">
        <span class="slider-value" id="sliderValueDisplay">65%</span>
      </div>
      <div class="slider-ticks">
        <span class="slider-tick" data-i18n="settings.compressionConservative">50% Conservative</span>
        <span class="slider-tick" data-i18n="settings.compressionDefault">65% Default</span>
        <span class="slider-tick" data-i18n="settings.compressionAggressive">80% Aggressive</span>
      </div>
    </div>

    <!-- Context Length -->
    <div class="settings-field">
      <label class="settings-label" for="contextLength" data-i18n="settings.contextLength">Context Length</label>
      <input class="settings-input" id="contextLength" type="number" data-i18n-placeholder="settings.contextLengthPlaceholder" placeholder="auto" min="1">
      <span class="settings-hint" data-i18n="settings.contextLengthHint">Leave empty for auto-detection</span>
    </div>

    <!-- Toolsets -->
    <div class="settings-group">
      <label class="settings-label" data-i18n="settings.toolsets">Toolsets</label>
      <div id="toolsetToggles" class="toolset-toggles"></div>
    </div>

    <!-- About & Updates -->
    <div class="settings-group" id="updatesGroup" style="display: none;">
      <label class="settings-label" data-i18n="settings.about">About</label>
      <div class="update-row">
        <span class="update-version" id="appVersion">v—</span>
        <button class="check-updates-btn" id="checkUpdatesBtn" data-i18n="settings.checkUpdates">Check for Updates</button>
      </div>
      <div class="update-status" id="updateStatus"></div>
    </div>
  </div>

  <div class="settings-footer">
    <button class="settings-save-btn" id="settingsSaveBtn" data-i18n="settings.save">Save</button>
    <div class="settings-status" id="settingsStatus"></div>
  </div>
</div>

<!-- ── Update modal ── -->
<div class="update-modal-backdrop" id="updateModalBackdrop">
  <div class="update-modal" role="dialog" aria-modal="true" aria-labelledby="updateModalTitle">
    <div class="update-modal-header" id="updateModalTitle" data-i18n="updater.title">Update Available</div>
    <div class="update-modal-body">
      <div class="update-version-line">
        <span data-i18n="updater.current">Current</span>: <span id="updateCurrentVersion">—</span>
        → <span data-i18n="updater.new">New</span>: <span class="new" id="updateNewVersion">—</span>
      </div>
      <div class="update-notes-label" data-i18n="updater.releaseNotes">Release Notes</div>
      <div class="update-notes" id="updateNotes">—</div>
      <div class="update-progress-container" id="updateProgressContainer">
        <div class="update-progress-track">
          <div class="update-progress-fill" id="updateProgressFill"></div>
        </div>
        <div class="update-progress-text" id="updateProgressText" data-i18n="updater.preparing">Preparing download…</div>
      </div>

    <div class="update-modal-footer">

      <button class="update-btn primary" id="updateInstallBtn" data-i18n="updater.install">Install &amp; Restart</button>
    </div>
  </div>
</div>

      'btn.theme': '切换主题',
      'btn.settings': '设置',
      'btn.language': '语言',
      'model.loading': '加载中...',
      'model.unavailable': '不可用',
    }
  };

  let currentLocale = (function() {
    try {
      var saved = localStorage.getItem('iron_locale');
      if (saved === 'en' || saved === 'zh') return saved;
    } catch(e) {}
    var nav = (navigator.language || '').toLowerCase();
    return nav.indexOf('zh') === 0 ? 'zh' : 'en';
  })();

  function t(key, params) {
    var dict = I18N[currentLocale] || I18N.en;
    var s = (dict[key] !== undefined) ? dict[key] : (I18N.en[key] !== undefined ? I18N.en[key] : key);
    if (params) {
      Object.keys(params).forEach(function(k) {
        s = s.replace('{' + k + '}', params[k]);
      });
    }
    return s;
  }

  function applyI18n(root) {
    root = root || document;
    root.querySelectorAll('[data-i18n]').forEach(function(el) {
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    root.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
      el.setAttribute('placeholder', t(el.getAttribute('data-i18n-placeholder')));
    });
    root.querySelectorAll('[data-i18n-title]').forEach(function(el) {
      el.setAttribute('title', t(el.getAttribute('data-i18n-title')));
    });
  }

  function setLocale(loc) {
    if (!I18N[loc]) return;
    currentLocale = loc;
    try { localStorage.setItem('iron_locale', loc); } catch(e) {}
    document.documentElement.setAttribute('lang', loc === 'zh' ? 'zh-CN' : 'en');
    applyI18n();
    syncLangPopover();
  }

  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const sendIcon = document.getElementById('sendIcon');
  const modelSelect = document.getElementById('modelSelect');

  // Sidebar (mobile)
  const appSidebar = document.getElementById('appSidebar');
  const mobileSidebarToggle = document.getElementById('mobileSidebarToggle');
  if (mobileSidebarToggle) {
    mobileSidebarToggle.addEventListener('click', function() {
      appSidebar.classList.toggle('open');
    });
  }

  // Language popover
  const langToggleBtn = document.getElementById('langToggleBtn');
  const langPopover = document.getElementById('langPopover');
  function syncLangPopover() {
    langPopover.querySelectorAll('.lang-option').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.locale === currentLocale);
    });
  }
  langToggleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    langPopover.classList.toggle('open');
  });
  langPopover.querySelectorAll('.lang-option').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      setLocale(btn.dataset.locale);
      langPopover.classList.remove('open');
    });
  });
  document.addEventListener('click', function(e) {
    if (!langPopover.contains(e.target) && e.target !== langToggleBtn && !langToggleBtn.contains(e.target)) {
      langPopover.classList.remove('open');
    }
  });

  // Theme toggle
  const themeToggleBtn = document.getElementById('themeToggleBtn');
  const themeIconLight = themeToggleBtn.querySelector('.theme-icon-light');
  const themeIconDark = themeToggleBtn.querySelector('.theme-icon-dark');
  function syncThemeIcon() {
    const dark = document.documentElement.classList.contains('dark');
    themeIconLight.style.display = dark ? 'none' : '';
    themeIconDark.style.display = dark ? '' : 'none';
  }
  syncThemeIcon();
  themeToggleBtn.addEventListener('click', function() {
    const dark = document.documentElement.classList.toggle('dark');
    try { localStorage.setItem('iron_theme', dark ? 'dark' : 'light'); } catch(e) {}
    syncThemeIcon();
  });

  // Settings
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const settingsBackdrop = document.getElementById('settingsBackdrop');
  const settingsCloseBtn = document.getElementById('settingsCloseBtn');
  const providerUrlInput = document.getElementById('providerUrl');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const apiKeyCopyBtn = document.getElementById('apiKeyCopyBtn');
  const auxModelSelect = document.getElementById('auxModelSelect');
  const compressionSlider = document.getElementById('compressionSlider');
  const sliderValueDisplay = document.getElementById('sliderValueDisplay');
  const contextLengthInput = document.getElementById('contextLength');
  const settingsSaveBtn = document.getElementById('settingsSaveBtn');
  const settingsStatus = document.getElementById('settingsStatus');

  apiKeyCopyBtn.addEventListener('click', function() {
    var val = apiKeyInput.value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(function() {
      apiKeyCopyBtn.classList.add('copied');
      setTimeout(function() { apiKeyCopyBtn.classList.remove('copied'); }, 1500);
    });
  });

  // Session management
  let chatId = localStorage.getItem('iron_chat_id') || crypto.randomUUID();
  localStorage.setItem('iron_chat_id', chatId);

  let messages = [];
  let isStreaming = false;
  let abortController = null;

  // ── Fetch provider models ──
  async function loadModels(baseUrl) {
    const url = baseUrl ? (baseUrl.replace(/\/$/, '') + '/models') : '/v1/provider/models';
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('Failed to fetch models');
      const data = await resp.json();
      return (data.data || []).map(function(m) { return m.id; });
    } catch (e) {
      return [];
    }
  }

  async function populateMainModelSelect(models) {
    const current = modelSelect.value;
    modelSelect.innerHTML = '';
    if (models.length === 0) {
      modelSelect.innerHTML = '<option value="">' + escapeHtml(t('model.unavailable')) + '</option>';
      return;
    }
    models.forEach(function(id) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = id;
      modelSelect.appendChild(opt);
    });
    if (current && models.indexOf(current) !== -1) {
      modelSelect.value = current;
    }
  }

  async function populateAuxModelSelect(models, selectedValue) {
    const current = selectedValue !== undefined ? selectedValue : auxModelSelect.value;
    auxModelSelect.innerHTML = '<option value="">' + escapeHtml(t('settings.auxModelNone')) + '</option>';
    models.forEach(function(id) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = id;
      auxModelSelect.appendChild(opt);
    });
    if (current && models.indexOf(current) !== -1) {
      auxModelSelect.value = current;
    }
  }

  async function initModels() {
    modelSelect.innerHTML = '<option value="">' + escapeHtml(t('model.loading')) + '</option>';
    const models = await loadModels(null);
    await populateMainModelSelect(models);
    await populateAuxModelSelect(models, undefined);
  }
  initModels();

  // ── Manual refresh button ──
  const refreshModelsBtn = document.getElementById('refreshModelsBtn');
  refreshModelsBtn.addEventListener('click', async function() {
    if (refreshModelsBtn.disabled) return;
    refreshModelsBtn.disabled = true;
    refreshModelsBtn.classList.add('spinning');
    try {
      const models = await loadModels(null);
      await populateMainModelSelect(models);
      await populateAuxModelSelect(models, undefined);
    } finally {
      refreshModelsBtn.classList.remove('spinning');
      refreshModelsBtn.disabled = false;
    }
  });

  // ── Load config from API ──
  async function loadConfig() {
    try {
      const resp = await fetch('/api/config');
      if (!resp.ok) return;
      const cfg = await resp.json();
      if (cfg.llm_base_url) {
        providerUrlInput.value = cfg.llm_base_url;
      }
      apiKeyInput.value = '';
      if (cfg.llm_api_key_set) {
        apiKeyInput.placeholder = '••••••••';
      } else {
        apiKeyInput.placeholder = '';
      }
      if (cfg.compression_threshold !== undefined && cfg.compression_threshold !== null) {
        compressionSlider.value = Math.round(cfg.compression_threshold * 100);
        sliderValueDisplay.textContent = compressionSlider.value + '%';
      }
      if (cfg.context_length !== undefined && cfg.context_length !== null) {
        contextLengthInput.value = cfg.context_length;
      }
      if (cfg.aux_model) {
        var attempts = 0;
        var trySetAux = function() {
          attempts++;
          if (auxModelSelect.options.length > 1) {
            auxModelSelect.value = cfg.aux_model || '';
          } else if (attempts < 20) {
            setTimeout(trySetAux, 100);
          }
        };
        setTimeout(trySetAux, 200);
      }
    } catch (e) {}
  }
  loadConfig();

  // ── Re-fetch models when provider URL changes ──
  var providerUrlTimer = null;
  providerUrlInput.addEventListener('input', function() {
    clearTimeout(providerUrlTimer);
    providerUrlTimer = setTimeout(async function() {
      const url = providerUrlInput.value.trim();
      if (!url) return;
      const models = await loadModels(url);
      if (models.length > 0) {
        await populateMainModelSelect(models);
        await populateAuxModelSelect(models, undefined);
      }
    }, 600);
  });

  // ── Load toolset toggles ──
  async function loadToolsets() {
    try {
      var resp = await fetch('/api/toolsets');
      if (!resp.ok) return;
      var data = await resp.json();
      var container = document.getElementById('toolsetToggles');
      if (!container || !data.toolsets) return;
      container.innerHTML = '';
      data.toolsets.forEach(function(ts) {
        var div = document.createElement('div');
        div.className = 'toolset-toggle';
        var label = document.createElement('label');
        label.innerHTML = ts.name + '<span class="tool-count">(' + ts.tool_count + ')</span>';
        label.setAttribute('for', 'ts-' + ts.name);
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = 'ts-' + ts.name;
        cb.checked = ts.enabled;
        cb.dataset.toolset = ts.name;
        div.appendChild(label);
        div.appendChild(cb);
        container.appendChild(div);
      });
    } catch (e) {}
  }

  // ── Slider live update ──
  compressionSlider.addEventListener('input', function() {
    sliderValueDisplay.textContent = compressionSlider.value + '%';
  });

  // ── Settings panel open/close ──
  function openSettings() {
    settingsPanel.classList.add('open');
    settingsBackdrop.classList.add('open');
    settingsBtn.classList.add('active');
    loadToolsets();
  }

  function closeSettings() {
    settingsPanel.classList.remove('open');
    settingsBackdrop.classList.remove('open');
    settingsBtn.classList.remove('active');
  }

  settingsBtn.addEventListener('click', function() {
    if (settingsPanel.classList.contains('open')) closeSettings();
    else openSettings();
  });

  settingsCloseBtn.addEventListener('click', closeSettings);
  settingsBackdrop.addEventListener('click', closeSettings);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && settingsPanel.classList.contains('open')) closeSettings();
  });

  // ── Save config ──
  settingsSaveBtn.addEventListener('click', async function() {
    settingsSaveBtn.disabled = true;
    settingsStatus.textContent = '';
    settingsStatus.className = 'settings-status';

    var disabledToolsets = [];
    document.querySelectorAll('#toolsetToggles input[type="checkbox"]').forEach(function(cb) {
      if (!cb.checked) disabledToolsets.push(cb.dataset.toolset);
    });

    const payload = {
      llm_base_url: providerUrlInput.value.trim() || null,
      aux_model: auxModelSelect.value || null,
      compression_threshold: parseFloat(compressionSlider.value) / 100,
      context_length: contextLengthInput.value ? parseInt(contextLengthInput.value, 10) : null,
      disabled_toolsets: disabledToolsets
    };
    var apiKeyVal = apiKeyInput.value.trim();
    if (apiKeyVal) payload.llm_api_key = apiKeyVal;

    try {
      const resp = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(errText || resp.statusText);
      }
      settingsStatus.textContent = t('settings.saved');
      settingsStatus.className = 'settings-status ok';
      setTimeout(function() {
        settingsStatus.textContent = '';
        settingsStatus.className = 'settings-status';
      }, 2000);
    } catch (e) {
      settingsStatus.textContent = t('settings.errorPrefix', { msg: e.message });
      settingsStatus.className = 'settings-status err';
    } finally {
      settingsSaveBtn.disabled = false;
    }
  });

  // ── Auto-grow textarea ──
  function autoGrow() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  }
  msgInput.addEventListener('input', autoGrow);

  // ── Key handling ──
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', function() {
    if (isStreaming) stopStreaming();
    else send();
  });

  function stopStreaming() {
    if (abortController) abortController.abort();
  }

  // ── Markdown + LaTeX rendering ──
  function renderMarkdown(text) {
    if (typeof marked !== 'undefined') {
      try {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(text);
      } catch (e) {}
    }
    var html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.replace(/\n$/, '') + '</code></pre>';
    });
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    var parts = html.split(/(<pre>[\s\S]*?<\/pre>)/);
    html = parts.map(function(part) {
      if (part.startsWith('<pre>')) return part;
      var paragraphs = part.split(/\n\n+/);
      return paragraphs.map(function(p) {
        p = p.trim();
        if (!p) return '';
        p = p.replace(/\n/g, '<br>');
        return '<p>' + p + '</p>';
      }).join('');
    }).join('');
    return html;
  }

  function renderLatex(element) {
    if (typeof renderMathInElement !== 'undefined') {
      try {
        renderMathInElement(element, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true},
          ],
          throwOnError: false,
        });
      } catch (e) {}
    }
  }

  // Geo-avatar HTML (CSS-drawn Iron Hermes mark)
  function geoAvatarHtml() {
    return '<div class="msg-avatar">' +
      '<div class="geo-circle"></div>' +
      '<div class="geo-square"></div>' +
      '<div class="geo-diamond"></div>' +
      '</div>';
  }

  // ── Append a message to DOM ──
  function appendMessage(role, content, isLoading) {
    if (emptyState) emptyState.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = 'message message-' + role;

    const body = document.createElement('div');
    body.className = 'msg-body';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';

    if (isLoading) {
      contentDiv.innerHTML =
        '<div class="loading-indicator">' +
        '<div class="loading-dot"></div>' +
        '<div class="loading-dot"></div>' +
        '<div class="loading-dot"></div>' +
        '<span class="loading-text">' + escapeHtml(t('chat.thinking')) + '</span>' +
        '</div>';
    } else if (role === 'user') {
      contentDiv.textContent = content;
      contentDiv.innerHTML = '<p>' + contentDiv.innerHTML.replace(/\n/g, '<br>') + '</p>';
    } else {
      contentDiv.innerHTML = renderMarkdown(content);
      renderLatex(contentDiv);
    }

    bubble.appendChild(contentDiv);

    if (role === 'assistant') {
      wrap.innerHTML = geoAvatarHtml();
      body.appendChild(bubble);
      wrap.appendChild(body);
    } else {
      body.appendChild(bubble);
      wrap.appendChild(body);
    }

    chatArea.appendChild(wrap);
    scrollToBottom();
    return contentDiv;
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ── Set streaming state ──
  function setStreaming(val) {
    isStreaming = val;
    msgInput.disabled = val;
    if (val) {
      sendIcon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="1" fill="currentColor" stroke="none"/>';
      sendBtn.title = t('btn.stop');
      sendBtn.disabled = false;
    } else {
      sendIcon.innerHTML = '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>';
      sendBtn.title = t('btn.send');
      sendBtn.disabled = false;
      abortController = null;
      msgInput.focus();
    }
  }

  // ── Send message ──
  async function send() {
    const text = msgInput.value.trim();
    if (!text || isStreaming) return;

    messages.push({ role: 'user', content: text });
    appendMessage('user', text, false);
    msgInput.value = '';
    autoGrow();

    // Retire previous todo container so a new turn gets its own
    var prevTodo = document.getElementById('todo-current');
    if (prevTodo) prevTodo.removeAttribute('id');

    const loadingContent = appendMessage('assistant', '', true);
    const assistantDiv = loadingContent.closest('.message');
    currentAssistantDiv = assistantDiv;

    setStreaming(true);
    let fullText = '';

    try {
      abortController = new AbortController();
      const response = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Platform': 'webui',
          'X-Chat-Id': chatId,
          'X-User-Id': 'local',
        },
        body: JSON.stringify({
          messages: messages,
          model: modelSelect.value || undefined,
          stream: true
        }),
        signal: abortController.signal
      });

      if (!response.ok) {
        const err = await response.text();
        loadingContent.innerHTML = '<p style="color:var(--error)">' + escapeHtml(t('chat.errorPrefix', { msg: err })) + '</p>';
        setStreaming(false);
        return;
      }

      fullText = '';
      let loadingCleared = false;

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let currentEvent = null;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();

          if (!trimmed) { currentEvent = null; continue; }

          if (trimmed.startsWith('event:')) {
            currentEvent = trimmed.slice(6).trim();
            continue;
          }

          if (!trimmed.startsWith('data:')) continue;

          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;

          if (currentEvent === 'tool_started') {
            try {
              var toolData = JSON.parse(data);
              if (!loadingCleared) {
                loadingContent.innerHTML =
                  '<div class="loading-indicator">' +
                  '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>' +
                  '<span class="loading-text">' + escapeHtml(t('chat.calling', { tool: toolData.tool })) + '</span>' +
                  '</div>';
              }
              handleToolStarted(toolData);
            } catch(e) {}
            currentEvent = null;
          } else if (currentEvent === 'tool_completed') {
            try {
              var completedData = JSON.parse(data);
              handleToolCompleted(completedData);
              if (!loadingCleared) {
                loadingContent.innerHTML =
                  '<div class="loading-indicator">' +
                  '<div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div>' +
                  '<span class="loading-text">' + escapeHtml(t('chat.generating')) + '</span>' +
                  '</div>';
              }
            } catch(e) {}
            currentEvent = null;
          } else if (currentEvent === 'todo_update') {
            try {
              var todoData = JSON.parse(data);
              handleTodoUpdate(todoData.todos);
            } catch(e) {}
            currentEvent = null;
          } else {
            currentEvent = null;
            try {
              const parsed = JSON.parse(data);
              const delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta;
              if (delta && delta.content) {
                loadingCleared = true;
                fullText += delta.content;
                loadingContent.innerHTML = renderMarkdown(fullText);
                scrollToBottom();
              }
            } catch (e) {}
          }
        }
      }

      if (fullText) {
        loadingContent.innerHTML = renderMarkdown(fullText);
        renderLatex(loadingContent);
        messages.push({ role: 'assistant', content: fullText });
      } else {
        loadingContent.innerHTML = '<p style="color:var(--text-muted)">' + escapeHtml(t('chat.noResponse')) + '</p>';
      }

    } catch (err) {
      if (err.name === 'AbortError') {
        if (fullText) {
          loadingContent.innerHTML = renderMarkdown(fullText);
          renderLatex(loadingContent);
          messages.push({ role: 'assistant', content: fullText });
        } else {
          loadingContent.innerHTML = '<p style="color:var(--text-muted)">' + escapeHtml(t('chat.stopped')) + '</p>';
        }
      } else {
        loadingContent.innerHTML = '<p style="color:var(--error)">' + escapeHtml(t('chat.connectionError', { msg: err.message })) + '</p>';
      }
    }

    setStreaming(false);
    currentAssistantDiv = null;
    scrollToBottom();
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // ── Tool progress handlers ──
  const activeTools = {};
  let currentAssistantDiv = null;

  function handleToolStarted(data) {
    if (emptyState) emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'tool-progress';
    div.id = 'tool-' + data.call_id;
    div.innerHTML =
      '<span class="tool-spinner"></span>' +
      '<span class="tool-name">' + escapeHtml(data.tool) + '</span>' +
      '<span class="tool-args">(' + escapeHtml(data.args_preview) + ')</span>';
    if (currentAssistantDiv && currentAssistantDiv.parentNode === chatArea) {
      chatArea.insertBefore(div, currentAssistantDiv);
    } else {
      chatArea.appendChild(div);
    }
    activeTools[data.call_id] = { element: div, startTime: Date.now() };
    scrollToBottom();
  }

  function handleToolCompleted(data) {
    const entry = activeTools[data.call_id];
    if (entry) {
      const updateDom = function() {
        const icon = data.success ? '✓' : '✕';
        const cls = data.success ? 'tool-done' : 'tool-error';
        const info = data.success
          ? (data.duration_ms + 'ms' + (data.result_preview ? ' · ' + escapeHtml(data.result_preview) : ''))
          : escapeHtml(data.result_preview);
        entry.element.className = 'tool-progress ' + cls;
        entry.element.innerHTML =
          '<span class="tool-icon">' + icon + '</span>' +
          '<span class="tool-name">' + escapeHtml(data.tool) + '</span>' +
          '<span class="tool-result">' + info + '</span>';
        delete activeTools[data.call_id];
      };
      const elapsed = Date.now() - entry.startTime;
      const minVisible = 300;
      if (elapsed < minVisible) setTimeout(updateDom, minVisible - elapsed);
      else updateDom();
    }
  }

  function handleTodoUpdate(todos) {
    if (!todos || !todos.length) return;
    var container = document.getElementById('todo-current');
    if (!container) {
      container = document.createElement('div');
      container.className = 'todo-container';
      container.id = 'todo-current';
      if (currentAssistantDiv && currentAssistantDiv.parentNode === chatArea) {
        chatArea.insertBefore(container, currentAssistantDiv);
      } else {
        chatArea.appendChild(container);
      }
    }
    var html = '';
    for (var i = 0; i < todos.length; i++) {
      var item = todos[i];
      var statusCls = 'todo-pending';
      var icon = '○';
      if (item.status === 'in_progress') { statusCls = 'todo-in-progress'; icon = '◐'; }
      else if (item.status === 'completed') { statusCls = 'todo-completed'; icon = '✓'; }
      html += '<div class="todo-item ' + statusCls + '">' +
        '<span class="todo-icon">' + icon + '</span>' +
        '<span class="todo-content">' + escapeHtml(item.content) + '</span>' +
        '</div>';
    }
    container.innerHTML = html;
    scrollToBottom();
  }

  // ── New Chat button ──
  document.getElementById('newChatBtn').addEventListener('click', function() {
    chatId = crypto.randomUUID();
    localStorage.setItem('iron_chat_id', chatId);

    fetch('/api/session/reset', {
      method: 'POST',
      headers: {
        'X-Platform': 'webui',
        'X-Chat-Id': chatId,
        'X-User-Id': 'local',
      },
    });

    messages = [];
    chatArea.innerHTML = '';
    if (emptyState) {
      chatArea.appendChild(emptyState);
      emptyState.style.display = '';
    }
    // Close mobile sidebar if open
    appSidebar.classList.remove('open');
    msgInput.focus();
  });

  // ── Updater (Tauri desktop only) ──
  (function initUpdater() {
    var tauri = (typeof window !== 'undefined') ? window.__TAURI__ : null;
    if (!tauri || !tauri.core || !tauri.event) return;

    var invoke = tauri.core.invoke;
    var listen = tauri.event.listen;
    var getVersion = tauri.app && tauri.app.getVersion;

    var updatesGroup = document.getElementById('updatesGroup');
    var checkBtn = document.getElementById('checkUpdatesBtn');
    var versionEl = document.getElementById('appVersion');
    var versionSidebarEl = document.getElementById('appVersionSidebar');
    var statusEl = document.getElementById('updateStatus');
    var backdrop = document.getElementById('updateModalBackdrop');
    var currentEl = document.getElementById('updateCurrentVersion');
    var newEl = document.getElementById('updateNewVersion');
    var notesEl = document.getElementById('updateNotes');
    var progContainer = document.getElementById('updateProgressContainer');
    var progFill = document.getElementById('updateProgressFill');
    var progText = document.getElementById('updateProgressText');
    var laterBtn = document.getElementById('updateLaterBtn');
    var installBtn = document.getElementById('updateInstallBtn');

    updatesGroup.style.display = '';

    if (getVersion) {
      getVersion().then(function(v) {
        versionEl.textContent = 'v' + v;
        if (versionSidebarEl) versionSidebarEl.textContent = 'v' + v;
      }).catch(function() {});
    }

    function setStatus(text, level) {
      statusEl.className = 'update-status ' + (level || 'info');
      statusEl.textContent = text || '';
    }

    function openModal(info) {
      currentEl.textContent = 'v' + info.current_version;
      newEl.textContent = 'v' + info.version;
      notesEl.textContent = info.notes && info.notes.trim() ? info.notes : t('updater.noNotes');
      progContainer.classList.remove('active');
      progFill.style.width = '0%';
      progText.textContent = t('updater.preparing');
      installBtn.disabled = false;
      laterBtn.disabled = false;
      backdrop.classList.add('open');
    }
    function closeModal() { backdrop.classList.remove('open'); }

    function fmtBytes(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / 1024 / 1024).toFixed(1) + ' MB';
    }

    laterBtn.addEventListener('click', closeModal);

    installBtn.addEventListener('click', async function() {
      installBtn.disabled = true;
      laterBtn.disabled = true;
      progContainer.classList.add('active');
      try {
        await invoke('install_update');
      } catch (e) {
        var msg = (e && e.toString) ? e.toString() : String(e);
        progText.textContent = t('updater.failed', { msg: msg });
        setStatus(t('updater.failed', { msg: msg }), 'error');
        installBtn.disabled = false;
        laterBtn.disabled = false;
      }
    });

    checkBtn.addEventListener('click', async function() {
      checkBtn.disabled = true;
      setStatus(t('updater.checking'), 'info');
      try {
        var avail = await invoke('get_updater_availability');
        if (!avail.available) {
          setStatus(avail.reason || t('updater.unavailable'), 'info');
          return;
        }
        var info = await invoke('check_for_update');
        if (info) {
          setStatus(t('updater.available', { v: info.version }), 'success');
          openModal(info);
        } else {
          setStatus(t('updater.upToDate'), 'success');
        }
      } catch (e) {
        var msg = (e && e.toString) ? e.toString() : String(e);
        setStatus(t('updater.checkFailed', { msg: msg }), 'error');
      } finally {
        checkBtn.disabled = false;
      }
    });

    listen('update-available', function(evt) { openModal(evt.payload); });
    listen('update-progress', function(evt) {
      var p = evt.payload || {};
      if (p.total) {
        var pct = Math.min(100, Math.round(p.downloaded * 100 / p.total));
        progFill.style.width = pct + '%';
        progText.textContent = pct + '% (' + fmtBytes(p.downloaded) + ' / ' + fmtBytes(p.total) + ')';
      } else {
        progText.textContent = t('updater.downloaded', { n: fmtBytes(p.downloaded) });
      }
    });
  })();

  // Initial i18n apply
  document.documentElement.setAttribute('lang', currentLocale === 'zh' ? 'zh-CN' : 'en');
  applyI18n();
  syncLangPopover();

  msgInput.focus();
})();
</script>
