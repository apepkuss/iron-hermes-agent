<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON HERMES</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #FAFAFA;
  --text: #1A1A1A;
  --white: #FFFFFF;
  --accent: #C84B31;
  --border: #E0E0E0;
  --input-border: #CCCCCC;
  --code-bg: #F0F0F0;
  --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Consolas', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 800px;
  margin: 0 auto;
}

/* ── Header ── */
.header {
  padding: 28px 24px 20px;
  text-align: center;
  flex-shrink: 0;
  position: relative;
}

.header h1 {
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text);
}

.header-rule {
  width: 48px;
  height: 2px;
  background: var(--text);
  margin: 12px auto 0;
  border: none;
}

.model-selector {
  margin-top: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.model-selector label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.5;
}

.model-selector select {
  font-family: var(--font);
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid var(--input-border);
  border-radius: 2px;
  background: var(--white);
  color: var(--text);
  outline: none;
  cursor: pointer;
}

.model-selector select:focus {
  border-color: var(--text);
}

/* ── Settings gear button ── */
.settings-btn {
  position: absolute;
  top: 28px;
  right: 24px;
  width: 28px;
  height: 28px;
  background: none;
  border: 1px solid var(--input-border);
  border-radius: 2px;
  font-size: 14px;
  cursor: pointer;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.5;
  transition: opacity 0.15s ease, border-color 0.15s ease;
  line-height: 1;
}

.settings-btn:hover {
  opacity: 1;
  border-color: var(--text);
}

.settings-btn.active {
  opacity: 1;
  border-color: var(--text);
  background: var(--text);
  color: var(--white);
}

/* ── Settings overlay backdrop ── */
.settings-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26, 26, 26, 0.2);
  z-index: 100;
}

.settings-backdrop.open {
  display: block;
}

/* ── Settings panel ── */
.settings-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 320px;
  height: 100%;
  background: var(--white);
  border-left: 1px solid var(--border);
  z-index: 101;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  overflow-y: auto;
}

.settings-panel.open {
  transform: translateX(0);
}

.settings-panel-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.settings-panel-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.settings-close-btn {
  width: 24px;
  height: 24px;
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  color: var(--text);
  opacity: 0.4;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  padding: 0;
  transition: opacity 0.15s ease;
}

.settings-close-btn:hover {
  opacity: 1;
}

.settings-body {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  flex: 1;
}

/* ── Settings field ── */
.settings-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.settings-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.5;
}

.settings-input {
  font-family: var(--font);
  font-size: 13px;
  padding: 7px 10px;
  border: 1px solid var(--input-border);
  border-radius: 2px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  width: 100%;
  transition: border-color 0.15s ease;
}

.settings-input:focus {
  border-color: var(--text);
}

.settings-input::placeholder {
  color: #AAAAAA;
}

.settings-select {
  font-family: var(--font);
  font-size: 13px;
  padding: 7px 10px;
  border: 1px solid var(--input-border);
  border-radius: 2px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  width: 100%;
  cursor: pointer;
  transition: border-color 0.15s ease;
}

.settings-select:focus {
  border-color: var(--text);
}

.settings-hint {
  font-size: 11px;
  color: #AAAAAA;
  line-height: 1.4;
}

/* ── Slider field ── */
.slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.slider-value {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text);
  min-width: 36px;
  text-align: right;
  flex-shrink: 0;
}

.settings-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: var(--border);
  outline: none;
  border-radius: 1px;
  cursor: pointer;
}

.settings-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  background: var(--text);
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.15s ease;
}

.settings-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--text);
  border-radius: 50%;
  cursor: pointer;
  border: none;
  transition: background 0.15s ease;
}

.settings-slider::-webkit-slider-thumb:hover {
  background: var(--accent);
}

.settings-slider::-moz-range-thumb:hover {
  background: var(--accent);
}

.slider-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 4px;
}

.slider-tick {
  font-size: 10px;
  color: #AAAAAA;
  letter-spacing: 0.03em;
}

/* ── Settings footer ── */
.settings-footer {
  padding: 16px 20px 24px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.settings-save-btn {
  width: 100%;
  padding: 10px;
  background: var(--text);
  color: var(--white);
  border: none;
  border-radius: 2px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: opacity 0.15s ease;
}

.settings-save-btn:hover {
  opacity: 0.8;
}

.settings-save-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.settings-status {
  font-size: 11px;
  text-align: center;
  margin-top: 8px;
  min-height: 16px;
  color: #AAAAAA;
}

.settings-status.ok {
  color: #4CAF50;
}

.settings-status.err {
  color: var(--accent);
}

/* ── Chat area ── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 0 24px 24px;
  scroll-behavior: smooth;
}

/* ── Empty state ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 20px;
  opacity: 0.6;
  user-select: none;
}

.empty-logo {
  width: 64px;
  height: 64px;
  position: relative;
}

.empty-logo .geo-circle {
  width: 64px;
  height: 64px;
  border: 2px solid var(--text);
  border-radius: 50%;
  position: absolute;
  top: 0;
  left: 0;
}

.empty-logo .geo-square {
  width: 32px;
  height: 32px;
  border: 2px solid var(--text);
  position: absolute;
  top: 16px;
  left: 16px;
  transform: rotate(45deg);
}

.empty-title {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.empty-tagline {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: #999;
}

/* ── Messages ── */
.message {
  margin-bottom: 16px;
  padding: 14px 18px;
  max-width: 100%;
  animation: msgIn 0.2s ease-out;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.message-user {
  background: var(--text);
  color: var(--white);
  border-radius: 2px;
}

.message-assistant {
  background: var(--white);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 2px;
}

.message-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.5;
}

.message-user .message-label {
  color: var(--white);
}

.message-content {
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.message-content p {
  margin-bottom: 8px;
}

.message-content p:last-child {
  margin-bottom: 0;
}

.message-content strong {
  font-weight: 600;
}

.message-content code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--code-bg);
  padding: 2px 5px;
  border-radius: 2px;
}

.message-user .message-content code {
  background: rgba(255,255,255,0.15);
}

.message-content pre {
  background: #1A1A1A;
  color: #E0E0E0;
  padding: 14px 16px;
  margin: 10px 0;
  overflow-x: auto;
  border-radius: 2px;
  font-size: 13px;
  line-height: 1.5;
}

.message-content pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  color: inherit;
}

.message-user .message-content pre {
  background: rgba(255,255,255,0.1);
  color: #E0E0E0;
}

/* ── Loading indicator ── */
.loading-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
}

.loading-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}

.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1); }
}

/* ── Input area ── */
.input-area {
  flex-shrink: 0;
  padding: 16px 24px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  padding: 10px 14px;
  border: 1px solid var(--input-border);
  border-radius: 2px;
  background: var(--white);
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 160px;
  overflow-y: auto;
  transition: border-color 0.15s ease;
}

.input-row textarea:focus {
  border-color: var(--text);
}

.input-row textarea::placeholder {
  color: #AAAAAA;
}

.input-row textarea:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.send-btn {
  width: 44px;
  height: 44px;
  background: var(--accent);
  color: var(--white);
  border: none;
  border-radius: 2px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.15s ease;
}

.send-btn:hover {
  opacity: 0.85;
}

.send-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .app {
    max-width: 100%;
  }
  .header {
    padding: 20px 16px 16px;
  }
  .settings-btn {
    top: 20px;
    right: 16px;
  }
  .chat-area {
    padding: 0 16px 16px;
  }
  .input-area {
    padding: 12px 16px 16px;
  }
  .settings-panel {
    width: 100%;
  }
}

/* ── Scrollbar ── */
.chat-area::-webkit-scrollbar {
  width: 4px;
}
.chat-area::-webkit-scrollbar-track {
  background: transparent;
}
.chat-area::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}

.settings-panel::-webkit-scrollbar {
  width: 4px;
}
.settings-panel::-webkit-scrollbar-track {
  background: transparent;
}
.settings-panel::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>IRON HERMES</h1>
    <hr class="header-rule">
    <div class="model-selector">
      <label for="modelSelect">MODEL</label>
      <select id="modelSelect"><option value="">loading...</option></select>
    </div>
    <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-logo">
        <div class="geo-circle"></div>
        <div class="geo-square"></div>
      </div>
      <div class="empty-title">IRON HERMES</div>
      <div class="empty-tagline">Intelligent Agent Framework</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="msgInput" placeholder="Message..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" title="Send">&#8594;</button>
    </div>
  </div>
</div>

<!-- Settings backdrop -->
<div class="settings-backdrop" id="settingsBackdrop"></div>

<!-- Settings panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-panel-header">
    <span class="settings-panel-title">Settings</span>
    <button class="settings-close-btn" id="settingsCloseBtn" title="Close">&#10005;</button>
  </div>

  <div class="settings-body">
    <!-- Provider Base URL -->
    <div class="settings-field">
      <label class="settings-label" for="providerUrl">Provider URL</label>
      <input
        class="settings-input"
        id="providerUrl"
        type="text"
        placeholder="http://localhost:9068/v1"
        value="http://localhost:9068/v1"
      >
    </div>

    <!-- Auxiliary Model -->
    <div class="settings-field">
      <label class="settings-label" for="auxModelSelect">Auxiliary Model</label>
      <select class="settings-select" id="auxModelSelect">
        <option value="">None</option>
      </select>
      <span class="settings-hint">No auxiliary model = degraded compression</span>
    </div>

    <!-- Compression Threshold -->
    <div class="settings-field">
      <label class="settings-label">Compression Threshold</label>
      <div class="slider-row">
        <input
          class="settings-slider"
          id="compressionSlider"
          type="range"
          min="50"
          max="95"
          step="5"
          value="65"
        >
        <span class="slider-value" id="sliderValueDisplay">65%</span>
      </div>
      <div class="slider-ticks">
        <span class="slider-tick">50% Conservative</span>
        <span class="slider-tick">65% Default</span>
        <span class="slider-tick">80% Aggressive</span>
      </div>
    </div>

    <!-- Context Length Override -->
    <div class="settings-field">
      <label class="settings-label" for="contextLength">Context Length</label>
      <input
        class="settings-input"
        id="contextLength"
        type="number"
        placeholder="auto"
        min="1"
      >
      <span class="settings-hint">Leave empty for auto-detection</span>
    </div>
  </div>

  <div class="settings-footer">
    <button class="settings-save-btn" id="settingsSaveBtn">Save</button>
    <div class="settings-status" id="settingsStatus"></div>
  </div>
</div>

<script>
(function() {
  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const modelSelect = document.getElementById('modelSelect');

  // Settings elements
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const settingsBackdrop = document.getElementById('settingsBackdrop');
  const settingsCloseBtn = document.getElementById('settingsCloseBtn');
  const providerUrlInput = document.getElementById('providerUrl');
  const auxModelSelect = document.getElementById('auxModelSelect');
  const compressionSlider = document.getElementById('compressionSlider');
  const sliderValueDisplay = document.getElementById('sliderValueDisplay');
  const contextLengthInput = document.getElementById('contextLength');
  const settingsSaveBtn = document.getElementById('settingsSaveBtn');
  const settingsStatus = document.getElementById('settingsStatus');

  let messages = [];
  let isStreaming = false;
  let abortController = null;

  // ── Fetch provider models ──
  async function loadModels(baseUrl) {
    const url = baseUrl ? (baseUrl.replace(/\/$/, '') + '/models') : '/v1/provider/models';
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('Failed to fetch models');
      const data = await resp.json();
      return (data.data || []).map(function(m) { return m.id; });
    } catch (e) {
      return [];
    }
  }

  async function populateMainModelSelect(models) {
    const current = modelSelect.value;
    modelSelect.innerHTML = '';
    if (models.length === 0) {
      modelSelect.innerHTML = '<option value="">unavailable</option>';
      return;
    }
    models.forEach(function(id) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = id;
      modelSelect.appendChild(opt);
    });
    // Restore previous selection if still available
    if (current && models.indexOf(current) !== -1) {
      modelSelect.value = current;
    }
  }

  async function populateAuxModelSelect(models, selectedValue) {
    const current = selectedValue !== undefined ? selectedValue : auxModelSelect.value;
    auxModelSelect.innerHTML = '<option value="">None</option>';
    models.forEach(function(id) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = id;
      auxModelSelect.appendChild(opt);
    });
    if (current && models.indexOf(current) !== -1) {
      auxModelSelect.value = current;
    }
  }

  async function initModels() {
    modelSelect.innerHTML = '<option value="">loading...</option>';
    const models = await loadModels(null);
    await populateMainModelSelect(models);
    await populateAuxModelSelect(models, undefined);
  }
  initModels();

  // ── Load config from API ──
  async function loadConfig() {
    try {
      const resp = await fetch('/api/config');
      if (!resp.ok) return;
      const cfg = await resp.json();
      if (cfg.provider_url) {
        providerUrlInput.value = cfg.provider_url;
      }
      if (cfg.compression_threshold !== undefined && cfg.compression_threshold !== null) {
        compressionSlider.value = Math.round(cfg.compression_threshold * 100);
        sliderValueDisplay.textContent = compressionSlider.value + '%';
      }
      if (cfg.context_length !== undefined && cfg.context_length !== null) {
        contextLengthInput.value = cfg.context_length;
      }
      // aux_model will be set after models are loaded
      if (cfg.aux_model) {
        // Poll until aux model select is populated
        var attempts = 0;
        var trySetAux = function() {
          attempts++;
          if (auxModelSelect.options.length > 1) {
            auxModelSelect.value = cfg.aux_model || '';
          } else if (attempts < 20) {
            setTimeout(trySetAux, 100);
          }
        };
        setTimeout(trySetAux, 200);
      }
    } catch (e) {
      // Config endpoint may not exist yet — silently ignore
    }
  }
  loadConfig();

  // ── Re-fetch models when provider URL changes ──
  var providerUrlTimer = null;
  providerUrlInput.addEventListener('input', function() {
    clearTimeout(providerUrlTimer);
    providerUrlTimer = setTimeout(async function() {
      const url = providerUrlInput.value.trim();
      if (!url) return;
      const models = await loadModels(url);
      if (models.length > 0) {
        await populateMainModelSelect(models);
        await populateAuxModelSelect(models, undefined);
      }
    }, 600);
  });

  // ── Slider live update ──
  compressionSlider.addEventListener('input', function() {
    sliderValueDisplay.textContent = compressionSlider.value + '%';
  });

  // ── Settings panel open/close ──
  function openSettings() {
    settingsPanel.classList.add('open');
    settingsBackdrop.classList.add('open');
    settingsBtn.classList.add('active');
  }

  function closeSettings() {
    settingsPanel.classList.remove('open');
    settingsBackdrop.classList.remove('open');
    settingsBtn.classList.remove('active');
  }

  settingsBtn.addEventListener('click', function() {
    if (settingsPanel.classList.contains('open')) {
      closeSettings();
    } else {
      openSettings();
    }
  });

  settingsCloseBtn.addEventListener('click', closeSettings);
  settingsBackdrop.addEventListener('click', closeSettings);

  // Close on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && settingsPanel.classList.contains('open')) {
      closeSettings();
    }
  });

  // ── Save config ──
  settingsSaveBtn.addEventListener('click', async function() {
    settingsSaveBtn.disabled = true;
    settingsStatus.textContent = '';
    settingsStatus.className = 'settings-status';

    const payload = {
      provider_url: providerUrlInput.value.trim() || null,
      aux_model: auxModelSelect.value || null,
      compression_threshold: parseFloat(compressionSlider.value) / 100,
      context_length: contextLengthInput.value ? parseInt(contextLengthInput.value, 10) : null
    };

    try {
      const resp = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(errText || resp.statusText);
      }
      settingsStatus.textContent = 'Saved';
      settingsStatus.className = 'settings-status ok';
      setTimeout(function() {
        settingsStatus.textContent = '';
        settingsStatus.className = 'settings-status';
      }, 2000);
    } catch (e) {
      settingsStatus.textContent = 'Error: ' + e.message;
      settingsStatus.className = 'settings-status err';
    } finally {
      settingsSaveBtn.disabled = false;
    }
  });

  // ── Auto-grow textarea ──
  function autoGrow() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  }
  msgInput.addEventListener('input', autoGrow);

  // ── Key handling ──
  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', function() {
    if (isStreaming) {
      stopStreaming();
    } else {
      send();
    }
  });

  function stopStreaming() {
    if (abortController) {
      abortController.abort();
    }
  }

  // ── Markdown rendering ──
  function renderMarkdown(text) {
    // Escape HTML
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Code blocks: ```lang\n...\n```
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.replace(/\n$/, '') + '</code></pre>';
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

    // Split into blocks by double newline for paragraphs, but preserve pre blocks
    const parts = html.split(/(<pre>[\s\S]*?<\/pre>)/);
    html = parts.map(function(part) {
      if (part.startsWith('<pre>')) return part;
      // Convert single newlines to <br> and wrap in paragraphs
      const paragraphs = part.split(/\n\n+/);
      return paragraphs.map(function(p) {
        p = p.trim();
        if (!p) return '';
        p = p.replace(/\n/g, '<br>');
        return '<p>' + p + '</p>';
      }).join('');
    }).join('');

    return html;
  }

  // ── Append a message to DOM ──
  function appendMessage(role, content, isLoading) {
    if (emptyState) emptyState.style.display = 'none';

    const div = document.createElement('div');
    div.className = 'message message-' + role;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'You' : 'Hermes';
    div.appendChild(label);

    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';

    if (isLoading) {
      contentDiv.innerHTML =
        '<div class="loading-indicator">' +
        '<div class="loading-dot"></div>' +
        '<div class="loading-dot"></div>' +
        '<div class="loading-dot"></div>' +
        '</div>';
    } else if (role === 'user') {
      // User messages: render as plain text with line breaks
      contentDiv.textContent = content;
      contentDiv.innerHTML = '<p>' + contentDiv.innerHTML.replace(/\n/g, '<br>') + '</p>';
    } else {
      contentDiv.innerHTML = renderMarkdown(content);
    }

    div.appendChild(contentDiv);
    chatArea.appendChild(div);
    scrollToBottom();
    return contentDiv;
  }

  function scrollToBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  // ── Set streaming state ──
  function setStreaming(val) {
    isStreaming = val;
    msgInput.disabled = val;
    if (val) {
      sendBtn.innerHTML = '&#9632;'; // ■ stop icon
      sendBtn.title = 'Stop';
      sendBtn.disabled = false;
    } else {
      sendBtn.innerHTML = '&#8594;'; // → send icon
      sendBtn.title = 'Send';
      sendBtn.disabled = false;
      abortController = null;
      msgInput.focus();
    }
  }

  // ── Send message ──
  async function send() {
    const text = msgInput.value.trim();
    if (!text || isStreaming) return;

    // Add user message
    messages.push({ role: 'user', content: text });
    appendMessage('user', text, false);
    msgInput.value = '';
    autoGrow();

    // Show loading
    const loadingContent = appendMessage('assistant', '', true);
    const assistantDiv = loadingContent.parentElement;

    setStreaming(true);
    let fullText = '';

    try {
      abortController = new AbortController();
      const response = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: messages,
          model: modelSelect.value || undefined,
          stream: true
        }),
        signal: abortController.signal
      });

      if (!response.ok) {
        const err = await response.text();
        loadingContent.innerHTML = '<p style="color:var(--accent)">Error: ' + escapeHtml(err) + '</p>';
        setStreaming(false);
        return;
      }

      fullText = '';
      loadingContent.innerHTML = '';

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;

          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;

          try {
            const parsed = JSON.parse(data);
            const delta = parsed.choices && parsed.choices[0] && parsed.choices[0].delta;
            if (delta && delta.content) {
              fullText += delta.content;
              loadingContent.innerHTML = renderMarkdown(fullText);
              scrollToBottom();
            }
          } catch (e) {
            // skip malformed chunks
          }
        }
      }

      // Final render
      if (fullText) {
        loadingContent.innerHTML = renderMarkdown(fullText);
        messages.push({ role: 'assistant', content: fullText });
      } else {
        loadingContent.innerHTML = '<p style="color:#999">No response received.</p>';
      }

    } catch (err) {
      if (err.name === 'AbortError') {
        // User clicked stop — keep whatever was streamed so far
        if (fullText) {
          loadingContent.innerHTML = renderMarkdown(fullText);
          messages.push({ role: 'assistant', content: fullText });
        } else {
          loadingContent.innerHTML = '<p style="color:#999">Stopped.</p>';
        }
      } else {
        loadingContent.innerHTML = '<p style="color:var(--accent)">Connection error: ' + escapeHtml(err.message) + '</p>';
      }
    }

    setStreaming(false);
    scrollToBottom();
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  // Focus input on load
  msgInput.focus();
})();
</script>
</body>
</html>
