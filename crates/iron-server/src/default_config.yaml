# iron-hermes 配置文件
# 优先级：环境变量 > 本文件 > 默认值

# ── 主模型 ──────────────────────────────────────────────────
# LLM 模型标识符
model: "llama3"
# LLM 提供商的 base URL
base_url: "http://localhost:9068"
# LLM API key（建议通过环境变量 LLM_API_KEY 设置，避免明文存储）
api_key: ""
# 上下文长度覆盖（留空 = 自动检测）
# context_length: 128000

# ── 服务 ────────────────────────────────────────────────────
server:
  # 绑定地址
  host: "0.0.0.0"
  # 绑定端口
  port: 9069
  # 对外暴露的模型名称（/v1/models 端点）
  model_name: "iron-hermes"
  # 请求认证 token（空 = 不启用认证）
  auth_token: ""

# ── Agent 行为 ──────────────────────────────────────────────
agent:
  # 单次对话最大迭代轮数
  max_turns: 90
  # 单次执行墙钟超时（秒）
  timeout: 600
  # 无活动超时（秒），超过此时间无 LLM 响应/工具调用视为僵死
  inactivity_timeout: 300
  # 每 N 轮用户对话触发一次后台 memory/skill 审查（0 = 禁用）
  review_interval: 10

# ── Session ─────────────────────────────────────────────────
session:
  # 空闲超时（秒），超过后 session 过期，下次访问创建新 session
  idle_timeout: 1800
  # Session 终端命令的默认工作目录（支持 ~ 展开，不配置则使用进程 CWD）
  # default_working_dir: "~"

# ── 上下文压缩 ──────────────────────────────────────────────
compression:
  # 是否启用上下文压缩
  enabled: true
  # 触发压缩的上下文使用率阈值（0.50–0.95）
  threshold: 0.65
  # 压缩摘要使用的模型（空 = 使用主模型）
  summary_model: ""

# ── 降级 ────────────────────────────────────────────────────
fallback:
  # 降级模型（空 = 不降级）
  model: ""

# ── 工具集 ──────────────────────────────────────────────────
toolsets:
  # 禁用的工具集列表
  disabled: []
